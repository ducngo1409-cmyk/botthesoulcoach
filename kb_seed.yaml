# KB seed — câu hỏi + câu trả lời tiếng Việt.
# Keywords: EN + VI để fuzzy search hoạt động cho cả hai ngôn ngữ.
# Categories: focus, stress, sleep, motivation, anxiety, relationships, habits, general

- category: focus
  question: Hôm nay mình không tập trung được, có cách nào giúp không?
  answer: |
    Thử kỹ thuật Pomodoro 25/5: làm 1 việc 25 phút, nghỉ 5 phút, lặp 4 lần rồi nghỉ dài 30 phút.
    Đóng hết tab không cần thiết. Nếu suy nghĩ cứ lởn vởn, viết ra giấy —
    não sẽ thôi bám vì biết nó đã được "lưu" rồi.
  keywords: >
    focus, concentrate, distracted, can't focus, pomodoro, attention,
    không tập trung, mất tập trung, phân tâm, tập trung, khó tập trung,
    mãi không làm được, đầu óc lơ đãng, làm việc hiệu quả

- category: stress
  question: Mình đang cảm thấy bị quá tải
  answer: |
    Dừng lại 60 giây. Hít vào 4s, giữ 4s, thở ra 6s — lặp 5 lần.
    Cách này kích hoạt hệ thần kinh phó giao cảm, giảm cortisol.
    Sau đó viết ra 3 điều đang nặng đầu nhất và chọn MỘT cái để làm tiếp theo.
    Quá tải thường đến từ việc cố ôm hết mọi thứ cùng lúc.
  keywords: >
    overwhelmed, stress, stressed, anxious, too much, panic,
    căng thẳng, stress, quá tải, lo lắng, áp lực, bị áp đảo,
    quá nhiều việc, không chịu nổi, kiệt sức, mệt mỏi tinh thần

- category: sleep
  question: Mình mất ngủ, không ngủ được ban đêm
  answer: |
    Ba điều tối nay: (1) tắt màn hình 30 phút trước khi ngủ,
    (2) phòng mát ~19°C, (3) nếu nằm 20 phút chưa ngủ được thì dậy,
    ngồi chỗ tối, đọc sách giấy buồn tẻ rồi thử lại.
    Đừng nằm cố vì như vậy não sẽ quen liên kết giường với lo lắng.
  keywords: >
    sleep, insomnia, can't sleep, awake, tired, restless,
    mất ngủ, không ngủ được, khó ngủ, thức đêm, trằn trọc,
    ngủ không sâu, hay thức giấc, mệt mà không ngủ được

- category: motivation
  question: Mình không có động lực để bắt đầu
  answer: |
    Động lực đến sau hành động, không phải trước.
    Cam kết chỉ 2 phút thôi — mở file, mang giày, viết một câu.
    Rào cản thật sự là chi phí bắt đầu; một khi đã bắt đầu, đà sẽ tự cuốn đi.
    Nếu 2 phút vẫn còn ngại, thì 30 giây thôi.
  keywords: >
    motivation, lazy, procrastinate, can't start, no energy, motivated,
    thiếu động lực, lười biếng, trì hoãn, không muốn làm, không có năng lượng,
    không thấy hứng, mãi không bắt đầu được, chây lười, không có cảm hứng

- category: anxiety
  question: Mình cứ lo lắng mãi về một điều gì đó
  answer: |
    Thử kỹ thuật 5-4-3-2-1: nêu tên 5 thứ nhìn thấy, 4 thứ chạm được,
    3 thứ nghe được, 2 thứ ngửi được, 1 thứ nếm được.
    Cách này kéo não ra khỏi vòng lo lắng và về hiện tại.
    Nếu lo về vấn đề thật, đặt "khung lo" 15 phút sau và tự nhủ sẽ suy nghĩ đúng lúc đó.
  keywords: >
    anxiety, worry, anxious, nervous, fear, scared,
    lo âu, lo lắng, hồi hộp, sợ hãi, lo ngại, lo sợ,
    cứ nghĩ mãi, không dứt lo được, bất an, căng thẳng lo lắng

- category: habits
  question: Làm sao để xây dựng một thói quen mới?
  answer: |
    Ghép thói quen mới vào sau thói quen cũ: "sau khi đánh răng, mình sẽ thiền 1 phút".
    Tuần đầu giữ thật nhỏ — mục tiêu không phải kết quả, mà là việc xuất hiện.
    Đánh dấu X vào lịch giấy mỗi ngày. Đừng để đứt chuỗi.
  keywords: >
    habit, routine, build habit, consistency, daily,
    thói quen, xây dựng thói quen, duy trì thói quen, kiên trì, đều đặn,
    thói quen hàng ngày, lịch trình, tạo thói quen mới

- category: relationships
  question: Mình vừa cãi nhau với người thân
  answer: |
    Cho qua vài tiếng trước khi phản ứng — cảm xúc bùng phát rồi tự xẹp nhanh hơn mình nghĩ.
    Khi nói chuyện lại, mở đầu bằng phía của họ dù mình không đồng ý: "Mình hiểu bạn cảm thấy X".
    Nói như vậy giúp hạ nhiệt. Sau đó mới chia sẻ cảm xúc của mình — dạng cảm xúc, không phải buộc tội.
  keywords: >
    fight, argue, conflict, relationship, partner, family, friend,
    cãi nhau, mâu thuẫn, xung đột, tranh cãi, tình cảm, bạn bè, gia đình,
    người thân, mâu thuẫn tình cảm, hiểu lầm, giận nhau

- category: general
  question: Mình chỉ muốn tâm sự thôi
  answer: |
    Mình đây. Kể mình nghe đi — không cần bắt đầu theo cách nào cụ thể.
    Nếu không biết bắt đầu từ đâu, thử "Hôm nay mình cảm thấy..." và cứ để nó chảy tự nhiên.
  keywords: >
    talk, listen, chat, share, lonely,
    muốn chia sẻ, lắng nghe, tâm sự, cô đơn, buồn,
    cần nói chuyện, không biết chia sẻ với ai, tâm sự, nói chuyện
